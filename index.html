<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1st EV-niversary Lucky Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --pink: #1A6AC8; --pink2: #2A8FE8; --gold: #C19B50; --gold-light: #E2C47A;
  --white: #ffffff; --off: #f0f4f8; --dark: #0a1628;
}
html, body { width:100%; height:100%; background:var(--off); font-family:'Montserrat',sans-serif; overflow:hidden; user-select:none; }

.header {
  width:100%; padding:40px 40px 60px;
  background:linear-gradient(135deg,#0d4fa0 0%,#1a6ac8 40%,#2a8fe8 70%,#5bb3f5 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; overflow:hidden; flex-shrink:0;
}
.header::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 120%,rgba(255,255,255,0.12) 0%,transparent 70%),
    radial-gradient(circle at 10% 50%,rgba(255,255,255,0.06) 0%,transparent 50%),
    radial-gradient(circle at 90% 50%,rgba(255,255,255,0.06) 0%,transparent 50%);
  pointer-events:none;
}
.header::after {
  content:''; position:absolute; top:-50%; left:-20%; width:40%; height:200%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,0.07),transparent);
  transform:skewX(-15deg); pointer-events:none;
}
.header-title {
  font-size:clamp(1.2rem,3vw,2.2rem); font-weight:800; letter-spacing:0.04em;
  color:#ffffff; text-transform:uppercase; text-align:center; line-height:1.05;
  position:relative; text-shadow:0 2px 20px rgba(0,0,0,0.25);
}

.stage {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:60px 24px 24px; gap:28px; position:relative;
}
.stage::before {
  content:''; position:absolute; inset:0;
  background-image:linear-gradient(rgba(26,106,200,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,106,200,0.04) 1px,transparent 1px);
  background-size:40px 40px; pointer-events:none;
}

.reels-row { display:flex; align-items:center; justify-content:center; gap:12px; position:relative; z-index:1; }
.reel-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
.reel {
  width:clamp(72px,10vw,110px); height:clamp(90px,13vw,136px);
  background:#ffffff; border:2px solid #d0dcea; border-radius:6px;
  position:relative; overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.8);
}
.reel::before { content:''; position:absolute; inset:6px; border:1.5px dashed #b0c0d4; border-radius:3px; z-index:3; pointer-events:none; }
.reel::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(240,244,248,0.85) 0%,transparent 28%,transparent 72%,rgba(240,244,248,0.85) 100%);
  z-index:2; pointer-events:none;
}
.reel-tape { position:absolute; width:100%; display:flex; flex-direction:column; align-items:center; will-change:transform; }
.reel-char {
  width:100%; display:flex; align-items:center; justify-content:center;
  font-family:'Montserrat',sans-serif; font-weight:800; font-size:clamp(2rem,5.5vw,3.6rem);
  color:#0a1628; line-height:1; flex-shrink:0;
}

.winner-panel {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  opacity:0; transform:translateY(10px); transition:opacity 0.6s ease,transform 0.6s ease;
  position:relative; z-index:1; min-height:60px;
}
.winner-panel.show { opacity:1; transform:translateY(0); }
.wp-label { font-size:0.58rem; font-weight:700; letter-spacing:0.28em; color:var(--pink); text-transform:uppercase; }
.wp-name { font-size:clamp(1.2rem,3.5vw,2rem); font-weight:800; color:var(--dark); letter-spacing:0.03em; text-align:center; }
.wp-prize { font-size:0.62rem; font-weight:600; letter-spacing:0.18em; color:var(--gold); text-transform:uppercase; padding:5px 18px; border:1px solid rgba(193,155,80,0.4); background:rgba(193,155,80,0.07); border-radius:2px; }

.control-bar {
  width:100%; background:white; border-top:1px solid #d8e4f0;
  display:flex; align-items:center; justify-content:center;
  gap:10px; padding:12px 24px; flex-shrink:0; flex-wrap:wrap;
  box-shadow:0 -2px 12px rgba(26,106,200,0.06);
}
.prize-select {
  font-family:'Montserrat',sans-serif; font-size:0.62rem; font-weight:600; letter-spacing:0.1em;
  padding:10px 16px; background:#f0f4f8; border:1.5px solid #c8d8ec; color:var(--dark);
  cursor:pointer; outline:none; appearance:none; text-transform:uppercase; min-width:180px; border-radius:4px;
}
.cb-btn {
  font-family:'Montserrat',sans-serif; font-size:0.6rem; font-weight:700; letter-spacing:0.18em;
  text-transform:uppercase; padding:10px 22px; border-radius:4px; cursor:pointer;
  transition:all 0.16s; border:1.5px solid #c8d8ec; background:#f0f4f8; color:#4a6080;
}
.cb-btn:hover { background:#e0ecf8; border-color:#a0c0e0; color:var(--dark); }
.cb-btn.primary { background:linear-gradient(135deg,#1a6ac8,#2a8fe8); color:white; border-color:transparent; box-shadow:0 3px 12px rgba(26,106,200,0.3); }
.cb-btn.primary:hover { box-shadow:0 4px 16px rgba(26,106,200,0.45); opacity:0.92; }
.cb-btn.primary:disabled { background:#c8d8ec; color:#8098b8; box-shadow:none; cursor:not-allowed; }

/* ── WINNER OVERLAY ── */
.winner-overlay {
  position:fixed; inset:0; z-index:90;
  display:flex; align-items:center; justify-content:center;
  background:rgba(8,22,50,0.85); backdrop-filter:blur(10px);
  opacity:0; pointer-events:none; transition:opacity 0.4s ease;
}
.winner-overlay.show { opacity:1; pointer-events:auto; }

/* ── SPLIT CARD ── */
.wo-card {
  display:flex; flex-direction:row; align-items:stretch;
  background:#ffffff; border-radius:16px; position:relative;
  max-width:960px; width:94%;
  box-shadow:0 40px 100px rgba(0,0,0,0.35);
  animation:cardPop 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
  overflow:hidden;
  --headline-h: clamp(1.8rem,4vw,3rem);
}
@keyframes cardPop {
  from { transform:scale(0.88) translateY(20px); opacity:0; }
  to   { transform:scale(1) translateY(0); opacity:1; }
}
/* top colour bar */
.wo-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,#0d4fa0,#2a8fe8,#5bb3f5); z-index:2;
}

/* LEFT: image panel */
.wo-image-panel {
  width:380px; flex-shrink:0;
  background:linear-gradient(160deg,#0a1628 0%,#0d2a50 60%,#0f3a6e 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:48px 32px 40px; position:relative; overflow:hidden;
}
/* subtle radial glow behind image */
.wo-image-panel::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 90% 70% at 50% 60%,rgba(42,143,232,0.22) 0%,transparent 70%);
  pointer-events:none;
}
.wo-prize-img {
  width:100%; max-height:280px; object-fit:contain;
  position:relative; z-index:1;
  filter:drop-shadow(0 16px 40px rgba(0,0,0,0.6));
  transition:transform 0.4s ease;
}
.wo-prize-img:hover { transform:scale(1.04) translateY(-4px); }
.wo-img-prize-name {
  margin-top:24px; position:relative; z-index:1;
  font-size:0.58rem; font-weight:700; letter-spacing:0.28em;
  color:rgba(255,255,255,0.5); text-transform:uppercase; text-align:center;
}

/* RIGHT: info panel */
.wo-info-panel {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px 52px 52px;
}
.wo-eyebrow {
  font-size:var(--headline-h); font-weight:900; color:#0a1628;
  letter-spacing:0.01em; text-transform:uppercase;
  margin-bottom:calc(var(--headline-h)*0.55); line-height:1.05; text-align:center;
}
.wo-prize-label {
  font-size:calc(var(--headline-h)*0.52); font-weight:600; color:#1a3a60;
  letter-spacing:0.03em; text-align:center; line-height:1.2;
  text-transform:uppercase; margin-bottom:calc(var(--headline-h)*0.45);
}
.wo-divider {
  width:64px; height:3px;
  background:linear-gradient(90deg,#1a6ac8,#5bb3f5);
  border-radius:2px; margin-bottom:calc(var(--headline-h)*0.45);
}
.wo-winner-label {
  font-size:calc(var(--headline-h)*0.2); font-weight:400;
  letter-spacing:0.35em; color:#8098b8;
  text-transform:uppercase; margin-bottom:calc(var(--headline-h)*0.2);
}
.wo-name {
  font-size:calc(var(--headline-h)*0.48); font-weight:800; color:#1a3a60;
  letter-spacing:0.02em; text-align:center; line-height:1.15;
  margin-bottom:calc(var(--headline-h)*0.9);
}
.wo-continue {
  font-family:'Montserrat',sans-serif; font-size:calc(var(--headline-h)*0.18);
  font-weight:700; letter-spacing:0.22em; text-transform:uppercase;
  padding:13px 44px;
  background:linear-gradient(135deg,#1a6ac8,#2a8fe8);
  color:white; border:none; border-radius:6px; cursor:pointer;
  box-shadow:0 8px 20px rgba(26,106,200,0.3); transition:all 0.2s;
}
.wo-continue:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(26,106,200,0.45); }

/* ── NAME MODAL ── */
.modal-bg {
  position:fixed; inset:0; z-index:100; background:rgba(10,22,40,0.7);
  display:none; align-items:center; justify-content:center; backdrop-filter:blur(6px);
}
.modal-bg.show { display:flex; }
.modal {
  width:90%; max-width:520px; background:white; border-radius:8px;
  padding:28px 24px; display:flex; flex-direction:column; gap:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.modal-title { font-size:0.6rem; font-weight:700; letter-spacing:0.22em; color:var(--pink); text-transform:uppercase; }
.modal textarea {
  background:#f0f4f8; border:1.5px solid #c8d8ec; border-radius:4px; color:var(--dark);
  font-family:'DM Mono',monospace; font-size:0.8rem; font-weight:400; padding:12px;
  resize:vertical; min-height:180px; outline:none; line-height:1.65; letter-spacing:0.03em;
  transition:border-color 0.18s;
}
.modal textarea:focus { border-color:#1a6ac8; }
.modal-hint { font-size:0.56rem; color:#8098b8; letter-spacing:0.06em; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; }

/* ── LOG STRIP ── */
.log-strip {
  position:fixed; bottom:56px; left:0; right:0; z-index:20;
  background:rgba(240,244,248,0.96); border-top:1px solid #c8d8ec;
  max-height:0; overflow:hidden; transition:max-height 0.35s ease; backdrop-filter:blur(8px);
}
.log-strip.open { max-height:180px; }
.log-inner { padding:14px 24px; display:flex; flex-direction:column; gap:8px; max-height:180px; overflow-y:auto; }
.log-row { display:grid; grid-template-columns:28px 1fr auto; gap:14px; align-items:center; padding:8px 0; border-bottom:1px solid #e0ecf8; animation:fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.log-num { font-family:'DM Mono',monospace; font-size:0.6rem; color:#8098b8; text-align:right; }
.log-name { font-weight:600; font-size:0.85rem; color:var(--dark); }
.log-prize { font-size:0.55rem; font-weight:700; letter-spacing:0.14em; color:var(--gold); text-transform:uppercase; text-align:right; }

#confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:200; }
body { display:flex; flex-direction:column; }
.stage { flex:1; min-height:0; }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<audio id="spinSound" src="spin.mp3" preload="auto"></audio>

<div class="header">
  <img src="logo.webp" alt="Ghee Hua Logo" style="height:60px;margin-bottom:15px;position:relative;z-index:1;">
  <div class="header-title">1st EV-niversary Lucky Draw</div>
</div>

<div class="stage">
  <div class="reels-row" id="reelsRow"></div>
  <div class="winner-panel" id="winnerPanel">
    <div class="wp-label">Winner</div>
    <div class="wp-name" id="wpName"></div>
    <div class="wp-prize" id="wpPrize"></div>
  </div>
</div>

<!-- WINNER POPUP -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="wo-card">
    <!-- LEFT: Prize Image -->
    <div class="wo-image-panel">
      <img class="wo-prize-img" id="woPrizeImg" src="" alt="Prize">
      <div class="wo-img-prize-name" id="woImgPrizeName"></div>
    </div>
    <!-- RIGHT: Winner Info -->
    <div class="wo-info-panel">
      <div class="wo-eyebrow">Congratulations!</div>
      <div class="wo-prize-label" id="woPrizeLabel"></div>
      <div class="wo-divider"></div>
      <div class="wo-winner-label">Winner</div>
      <div class="wo-name" id="woNameLabel"></div>
      <button class="wo-continue" onclick="closeWinnerOverlay()">Continue →</button>
    </div>
  </div>
</div>

<div class="log-strip" id="logStrip">
  <div class="log-inner" id="logInner"></div>
</div>

<div class="control-bar">
  <select class="prize-select" id="prizeSelect" onchange="onPrizeChange()">
    <option value="">— Select Prize —</option>
  </select>
  <button class="cb-btn primary" id="drawBtn" onclick="startDraw()" disabled>Draw</button>
  <button class="cb-btn" onclick="openNames()">Names (<span id="availCount">0</span>)</button>
  <button class="cb-btn" id="logBtn" onclick="toggleLog()">Results (0)</button>
  <button class="cb-btn" onclick="resetAll()" style="color:#c05050;border-color:#f0c0c0;">Reset</button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">Participant List</div>
    <textarea id="nameInput"></textarea>
    <div class="modal-hint">One name per line · Changes apply immediately</div>
    <div class="modal-actions">
      <button class="cb-btn" onclick="closeModal()">Cancel</button>
      <button class="cb-btn primary" onclick="saveNames()">Save & Close</button>
    </div>
  </div>
</div>

<script>
const PRIZE_IMAGES = {
  'Travel Voucher (worth RM2,688)': 'Travel_Voucher__worth_RM2_688_.png',
  'Smart TV':                       'Smart_TV.png',
  'Smart Tablet':                   'Smart_Tablet.png',
  'Electronic Vacuum':              'Eelectronic_Vacuum.png',
  'Washing Machine':                'Washing_Machine.png',
  'Air Fryer':                      'Air_Fryer.png',
  'Stand Fan':                      'Stand_Fan.png',
  'Microwave':                      'Microwave.png',
  'Fridge':                         'Fridge.png',
  'Water Pressure Jet':             'Water_Pressure_Jet.png',
  'Hair Dryer':                     'Hair_Dryer.png',
};

const PRIZES = [
  'Travel Voucher (worth RM2,688)','Smart TV','Smart Tablet',
  'Electronic Vacuum','Washing Machine','Air Fryer',
  'Stand Fan','Microwave','Fridge','Water Pressure Jet','Hair Dryer',
];

let participants = [
  'Ahmad bin Abdullah','Siti Rahmah binti Kassim','Lee Wei Ming',
  'Chong Siew Lan','Mohd Farid bin Hassan','Jennifer Tan Mei Ling',
  'Rajan a/l Subramaniam','Nurul Ain binti Omar','Wong Kok Wai',
  'Fatimah binti Yusof','Lim Boon Huat','Amirul Haziq bin Zulkifli',
  'Grace Ling Ai Ling','Harith Azfar bin Ramli','Stella Wong Hui Ling',
  'Zaidi bin Mohd Noor','Chin Pei Fen','Azlan bin Aziz',
  'Mary Magdalene Thomas','Nazri bin Kamaruddin',
];

let available=[...participants], drawnPrizes=new Set(), winners=[], isDrawing=false, selectedPrize='';
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', CELL_H=120;
let reelElements=[];

function buildReels(count){
  const row=document.getElementById('reelsRow');
  row.innerHTML=''; reelElements=[];
  const n=count||8;
  for(let i=0;i<n;i++){
    const wrap=document.createElement('div'); wrap.className='reel-wrap';
    const reel=document.createElement('div'); reel.className='reel';
    const tape=document.createElement('div'); tape.className='reel-tape'; tape.style.transform='translateY(0)';
    const defaultChars=['G','H','E','E',' ','H','U','A'];
    const idle=document.createElement('div');
    idle.className='reel-char'; idle.style.height=CELL_H+'px'; idle.textContent=defaultChars[i]||' ';
    tape.appendChild(idle); reel.appendChild(tape); wrap.appendChild(reel); row.appendChild(wrap);
    reelElements.push({tape});
  }
}

function randChar(){return CHARS[Math.floor(Math.random()*CHARS.length)];}

function buildPrizeSelect(){
  const sel=document.getElementById('prizeSelect');
  sel.innerHTML='<option value="">— Select Prize —</option>';
  PRIZES.forEach(p=>{
    if(!drawnPrizes.has(p)){
      const opt=document.createElement('option');
      opt.value=p; opt.textContent=p;
      if(p===selectedPrize)opt.selected=true;
      sel.appendChild(opt);
    }
  });
  updateAvailCount();
}

function updateAvailCount(){document.getElementById('availCount').textContent=available.length;}

function onPrizeChange(){
  selectedPrize=document.getElementById('prizeSelect').value;
  document.getElementById('drawBtn').disabled=!selectedPrize||!available.length;
  document.getElementById('winnerPanel').classList.remove('show');
  buildReels(8);
}

function startDraw(){
  if(!selectedPrize||isDrawing||!available.length)return;
  isDrawing=true;
  document.getElementById('drawBtn').disabled=true;
  document.getElementById('winnerPanel').classList.remove('show');
  const spinSound=document.getElementById('spinSound');
  if(spinSound){spinSound.currentTime=0;spinSound.play().catch(()=>{});}
  const winner=available[Math.floor(Math.random()*available.length)];
  const nameChars=winner.toUpperCase().split('');
  buildReels(nameChars.length);
  const promises=nameChars.map((ch,i)=>new Promise(resolve=>{
    setTimeout(()=>spinReel(i,ch,resolve),i*60);
  }));
  Promise.all(promises).then(()=>{
    const s=document.getElementById('spinSound');
    if(s){s.pause();s.currentTime=0;}
    revealWinner(winner);
  });
}

function spinReel(idx,targetChar,onDone){
  const{tape}=reelElements[idx];
  const spinCount=28+Math.floor(Math.random()*14);
  tape.innerHTML='';
  const allChars=[];
  for(let i=0;i<spinCount;i++)allChars.push(randChar());
  allChars.push(targetChar);
  allChars.forEach(ch=>{
    const div=document.createElement('div');
    div.className='reel-char'; div.style.height=CELL_H+'px'; div.textContent=ch;
    tape.appendChild(div);
  });
  const targetY=-(spinCount*CELL_H);
  const dur=1200+idx*80+Math.random()*200;
  tape.style.transition='none'; tape.style.transform='translateY(0)';
  tape.getBoundingClientRect();
  tape.style.transition=`transform ${dur}ms cubic-bezier(0.25,0.1,0.25,1.0)`;
  tape.style.transform=`translateY(${targetY}px)`;
  setTimeout(()=>{tape.style.transition='none';onDone();},dur+80);
}

function revealWinner(name){
  available=available.filter(n=>n!==name);
  drawnPrizes.add(selectedPrize);
  winners.unshift({name,prize:selectedPrize});

  document.getElementById('wpName').textContent=name;
  document.getElementById('wpPrize').textContent=selectedPrize;
  document.getElementById('winnerPanel').classList.add('show');

  const imgEl=document.getElementById('woPrizeImg');
  const imgFile=PRIZE_IMAGES[selectedPrize];
  imgEl.src=imgFile||''; imgEl.style.display=imgFile?'block':'none';
  document.getElementById('woImgPrizeName').textContent=selectedPrize;
  document.getElementById('woPrizeLabel').textContent=selectedPrize;
  document.getElementById('woNameLabel').textContent=name;

  setTimeout(()=>{
    document.getElementById('winnerOverlay').classList.add('show');
    fireConfetti();
  },400);

  renderLog();
  isDrawing=false; selectedPrize='';
  buildPrizeSelect(); updateAvailCount();
  document.getElementById('drawBtn').disabled=true;
}

function closeWinnerOverlay(){document.getElementById('winnerOverlay').classList.remove('show');}

function renderLog(){
  const count=winners.length;
  document.getElementById('logBtn').textContent=`Results (${count})`;
  document.getElementById('logInner').innerHTML=winners.map((w,i)=>`
    <div class="log-row">
      <div class="log-num">${String(count-i).padStart(2,'0')}</div>
      <div class="log-name">${w.name}</div>
      <div class="log-prize">${w.prize}</div>
    </div>`).join('');
}
function toggleLog(){document.getElementById('logStrip').classList.toggle('open');}

function openNames(){
  document.getElementById('nameInput').value=participants.join('\n');
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
function saveNames(){
  participants=document.getElementById('nameInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
  available=participants.filter(p=>!winners.some(w=>w.name===p));
  updateAvailCount(); closeModal();
}

function resetAll(){
  if(!confirm('Reset all draws?'))return;
  available=[...participants]; drawnPrizes.clear(); winners=[]; selectedPrize='';
  buildPrizeSelect(); updateAvailCount();
  document.getElementById('drawBtn').disabled=true;
  document.getElementById('winnerPanel').classList.remove('show');
  document.getElementById('logStrip').classList.remove('open');
  renderLog(); buildReels(8);
}

const canvas=document.getElementById('confetti-canvas');
const ctx=canvas.getContext('2d');
let pieces=[],rafId=null;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
addEventListener('resize',resize); resize();
function fireConfetti(){
  const colors=['#1a6ac8','#2a8fe8','#5bb3f5','#C19B50','#E2C47A','#ffffff','#0d4fa0'];
  for(let i=0;i<130;i++)pieces.push({
    x:Math.random()*canvas.width,y:-10,
    w:5+Math.random()*10,h:3+Math.random()*5,
    color:colors[Math.floor(Math.random()*colors.length)],
    vx:-3+Math.random()*6,vy:2+Math.random()*5,
    rot:Math.random()*Math.PI*2,rv:(-1+Math.random()*2)*0.08,
    g:0.055+Math.random()*0.04,op:1,
  });
  if(!rafId)animate();
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.rot+=p.rv;
    if(p.y>canvas.height*0.72)p.op-=0.018;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.globalAlpha=Math.max(0,p.op);ctx.fillStyle=p.color;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
  });
  pieces=pieces.filter(p=>p.op>0);
  rafId=pieces.length?requestAnimationFrame(animate):null;
  if(!rafId)ctx.clearRect(0,0,canvas.width,canvas.height);
}

window.addEventListener('load',()=>{buildPrizeSelect();buildReels(8);renderLog();});
</script>
</body>
